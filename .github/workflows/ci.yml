name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ubuntu:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: asn-reality-audit --version
      - run: sh -n scripts/install.sh

  debian:
    runs-on: ubuntu-latest
    container: python:3.11-slim-bookworm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: asn-reality-audit --version
      - run: sh -n scripts/install.sh

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pip-audit bandit
      - run: python -m pip_audit --local
      - run: bandit -q -r src
