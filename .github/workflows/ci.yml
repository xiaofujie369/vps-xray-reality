name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ubuntu:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: asn-reality-audit --version
      - run: sh -n scripts/install.sh

  debian:
    runs-on: ubuntu-latest
    container: python:3.11-slim-bookworm
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: asn-reality-audit --version
      - run: sh -n scripts/install.sh

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pip-audit bandit
      - run: python -m pip_audit --local
      - run: bandit -q -r src
